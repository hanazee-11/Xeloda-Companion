<!DOCTYPE html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css"><title>Xeloda Companion v0.4</title></head><body>
<div class="card">
<h1>💙 Xeloda Companion v0.4</h1>
<div id="summary"></div>
<h3>📅 Cycle Calendar</h3>
<div id="calendar" class="grid"></div>

<h3>📊 Progress</h3>
<progress id="prog" max="100" value="0"></progress>
<p id="pct"></p>

<h3>🩺 Oncology Report</h3>
<textarea id="report" rows="6" placeholder="Notes for your oncologist"></textarea>
<button onclick="window.print()">Print Report</button>
</div>
<script src="app.js"></script></body></html>
